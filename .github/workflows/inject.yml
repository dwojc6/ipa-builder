name: Inject IPA
run-name: Inject ${{ inputs.app_name }} v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Display name for the app"
        required: true
        type: string
      version:
        description: "App version being processed"
        required: true
        type: string
      bundle_id:
        description: "Bundle identifier for the app"
        required: true
        type: string
      source_release_tag:
        description: "Temporary release tag holding the decrypted IPA"
        required: true
        type: string
      ipa_asset_name:
        description: "Decrypted IPA asset name in the temporary release"
        required: true
        type: string
      cyan_asset_name:
        description: ".cyan profile asset name in the temporary release"
        required: true
        type: string
      bundle_asset_name:
        description: "Optional zipped .bundle asset name in the temporary release"
        required: false
        type: string
      release_tag:
        description: "Final GitHub release tag for the injected IPA"
        required: true
        type: string
      release_name:
        description: "Final GitHub release title"
        required: true
        type: string
      output_asset_name:
        description: "Injected IPA filename"
        required: true
        type: string

concurrency:
  group: inject-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download source assets
        run: |
          mkdir -p work build
          gh release download "${{ inputs.source_release_tag }}" \
            --pattern "${{ inputs.ipa_asset_name }}" \
            --dir work
          gh release download "${{ inputs.source_release_tag }}" \
            --pattern "${{ inputs.cyan_asset_name }}" \
            --dir work
          if [ -n "${{ inputs.bundle_asset_name }}" ]; then
            gh release download "${{ inputs.source_release_tag }}" \
              --pattern "${{ inputs.bundle_asset_name }}" \
              --dir work
          fi

      - name: Validate downloaded IPA
        run: |
          file_type=$(file --mime-type -b "work/${{ inputs.ipa_asset_name }}")

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Downloaded file is not a valid IPA. Detected type: $file_type"
            exit 1
          fi

      - name: Install cyan
        run: |
          python3 -m pip install --user --upgrade \
            https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Preload optional bundle
        if: ${{ inputs.bundle_asset_name != '' }}
        run: |
          mkdir -p work/bundle
          unzip -q "work/${{ inputs.bundle_asset_name }}" -d work/bundle
          rm -rf work/payload_extract
          unzip -q "work/${{ inputs.ipa_asset_name }}" -d work/payload_extract

          app_dir=$(find work/payload_extract/Payload -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$app_dir" ]; then
            echo "::error::Could not locate .app folder in IPA payload"
            exit 1
          fi

          bundle_dir=$(find work/bundle -maxdepth 1 -type d -name "*.bundle" | head -n 1)
          if [ -z "$bundle_dir" ]; then
            echo "::error::Downloaded bundle archive does not contain a .bundle directory"
            exit 1
          fi

          rm -rf "$app_dir/$(basename "$bundle_dir")"
          cp -R "$bundle_dir" "$app_dir/"

          rm -f work/preloaded.ipa
          (
            cd work/payload_extract
            zip -qr ../preloaded.ipa Payload
          )

      - name: Inject tweaks into IPA
        run: |
          input_ipa="work/${{ inputs.ipa_asset_name }}"
          if [ -n "${{ inputs.bundle_asset_name }}" ]; then
            input_ipa="work/preloaded.ipa"
          fi

          cyan \
            -i "$input_ipa" \
            -o "build/${{ inputs.output_asset_name }}" \
            -z "work/${{ inputs.cyan_asset_name }}" \
            -n "${{ inputs.app_name }}" \
            -v "${{ inputs.version }}" \
            -b "${{ inputs.bundle_id }}" \
            --overwrite

      - name: Create or update injected release
        run: |
          notes="Injected build for ${{ inputs.app_name }} ${{ inputs.version }}"

          if gh release view "${{ inputs.release_tag }}" >/dev/null 2>&1; then
            gh release edit "${{ inputs.release_tag }}" \
              --title "${{ inputs.release_name }}" \
              --notes "$notes"
          else
            gh release create "${{ inputs.release_tag }}" \
              "build/${{ inputs.output_asset_name }}" \
              --title "${{ inputs.release_name }}" \
              --notes "$notes"
            exit 0
          fi

          gh release upload "${{ inputs.release_tag }}" \
            "build/${{ inputs.output_asset_name }}" \
            --clobber

      - name: Delete temporary decrypted release
        if: always()
        run: |
          gh release delete "${{ inputs.source_release_tag }}" --cleanup-tag --yes || true
